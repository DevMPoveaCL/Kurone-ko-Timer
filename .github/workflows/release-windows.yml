name: Windows Release Build

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: Attach installers to an existing GitHub Release
        required: true
        default: false
        type: boolean
      release_tag:
        description: Existing release tag to attach installers to, for example v1.0.0
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Run unit and component tests
        run: npm test

      - name: Run TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build Tauri Windows app
        run: npm run tauri -- build

      - name: Upload Windows installers as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kurone-ko-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Attach installers to GitHub Release
        if: ${{ inputs.upload_to_release && inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
